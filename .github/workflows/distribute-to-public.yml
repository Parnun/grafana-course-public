name: Distribute to grafana-course-public

on:
  push:
    branches:
      - distribution
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribute-to-public-main
  cancel-in-progress: false

jobs:
  distribute-to-public-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: distribution

      - name: Validate required secret
        env:
          PUBLIC_PUSH_TOKEN: ${{ secrets.PUBLIC_PUSH_TOKEN }}
        run: |
          if [[ -z "${PUBLIC_PUSH_TOKEN}" ]]; then
            echo "Missing PUBLIC_PUSH_TOKEN secret in this repository."
            echo "Add a fine-grained PAT with write access to teerasej/grafana-course-public before enabling distribution automation."
            exit 1
          fi

      - name: Build filtered distribution workspace
        run: |
          rm -rf /tmp/distribute-public
          mkdir -p /tmp/distribute-public
          rsync -a ./ /tmp/distribute-public/ \
            --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='source-engine/'

      - name: Publish distribution snapshot to grafana-course-public/main
        env:
          PUBLIC_PUSH_TOKEN: ${{ secrets.PUBLIC_PUSH_TOKEN }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO || 'teerasej/grafana-course-public' }}
        run: |
          set -euo pipefail

          SOURCE_SHA="${GITHUB_SHA}"
          SOURCE_REPO="${GITHUB_REPOSITORY}"
          PUSH_URL="https://x-access-token:${PUBLIC_PUSH_TOKEN}@github.com/${PUBLIC_REPO}.git"

          cd /tmp/distribute-public

          git init
          git config user.name "distribution-publisher[bot]"
          git config user.email "distribution-publisher[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Filtered workspace is empty; skipping distribution."
            exit 0
          fi

          git commit -m "distribute: ${SOURCE_SHA}"

          REMOTE_MAIN_SHA="$(git ls-remote "${PUSH_URL}" refs/heads/main | awk '{print $1}')"

          if [[ -n "${REMOTE_MAIN_SHA}" ]]; then
            git fetch "${PUSH_URL}" refs/heads/main:refs/remotes/public/main

            NEW_TREE="$(git rev-parse HEAD^{tree})"
            OLD_TREE="$(git rev-parse refs/remotes/public/main^{tree})"

            if [[ "${NEW_TREE}" == "${OLD_TREE}" ]]; then
              echo "No content changes after filtering; grafana-course-public/main is already up to date."
              exit 0
            fi

            git commit --amend -m "distribute: ${SOURCE_SHA} (from ${SOURCE_REPO})"
            git push --force-with-lease "${PUSH_URL}" HEAD:refs/heads/main
          else
            git push "${PUSH_URL}" HEAD:refs/heads/main
          fi

          echo "Successfully distributed to ${PUBLIC_REPO}/main"
          echo "Source commit: ${SOURCE_SHA}"
